<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adhiparasakthi College Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            text-align: center;
        }

        .container {
            margin-top: 60px;
            padding: 30px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        .naac {
            width: 200px;
            margin: 15px 0;
        }

        .login-box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- College Logo -->
        <img src="college-logo.png" class="logo" alt="College Logo">

        <h2>Adhiparasakthi College Login</h2>

        <!-- NAAC Certificate -->
        <img src="naac-certificate.png" class="naac" alt="NAAC Certificate">

        <!-- Login Form -->
        <div class="login-box">
            <form>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

    </div>

</body>
</html>
