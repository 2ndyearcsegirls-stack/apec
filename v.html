<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adhiparasakthi Engineering College</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
    }

    /* HEADER */
    .header {
        text-align: center;
        padding: 20px;
    }

    .header img {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
    }

    /* MAIN SECTION */
    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
        flex-wrap: wrap;
    }

    .card {
        width: 300px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        text-align: center;
    }

    .yellow {
        background: #ffd54f;
    }

    .admission {
        background: #ffeb3b;
    }

    .btn {
        background: red;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        margin-top: 10px;
    }

    .btn:hover {
        background: darkred;
    }

    .badge {
        width: 120px;
    }

    /* FOOTER BAR */
    .footer {
        background: #ffd54f;
        text-align: center;
        padding: 10px;
        margin-top: 30px;
        font-weight: bold;
    }
</style>

</head>

<body>

<!-- HEADER IMAGE (replace with your banner image) -->
<div class="header">
    <img src="college-banner.png" alt="College Banner">
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- UGC CARD -->
    <div class="card yellow">
        <h2>UGC</h2>
        <p>University Grants Commission</p>
        <h3>Autonomous Status</h3>
        <p>For 10 Years</p>
    </div>

    <!-- ADMISSION BOX -->
    <div class="card admission">
        <h3>2026 - 2027 Admissions Open</h3>
        <button class="btn">Click to Apply</button>
        <p>For queries contact: 7418064336, 7418065336</p>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    TNEA Counseling Code: 1401
</div>

</body>
</html>
