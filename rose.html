<!DOCTYPE html>
<html>
<head>
    <title>APEC College Logo Colors</title>
    <style>
        .logo-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 50px;
        }

        img {
            width: 150px;
            height: auto;
        }

        .red {
            filter: hue-rotate(0deg);
        }

        .blue {
            filter: hue-rotate(180deg);
        }

        .green {
            filter: hue-rotate(90deg);
        }

        .purple {
            filter: hue-rotate(270deg);
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">APEC College Logo in Different Colors</h2>

    <div class="logo-container">
        <img src="apec-logo.png" class="red" alt="Logo Red">
        <img src="apec-logo.png" class="blue" alt="Logo Blue">
        <img src="apec-logo.png" class="green" alt="Logo Green">
        <img src="apec-logo.png" class="purple" alt="Logo Purple">
    </div>

</body>
</html>
